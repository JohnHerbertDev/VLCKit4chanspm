name: Build VLCKit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15-arm64
    timeout-minutes: 360  # 6 hours max, adjust if needed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache the entire VLCKit build directory to avoid rebuilding dependencies
      - name: Cache VLCKit build
        uses: actions/cache@v4
        with:
          path: .build/vlckit
          key: ${{ runner.os }}-vlckit-${{ hashFiles('build-vlckit-4chan.sh') }}
          restore-keys: |
            ${{ runner.os }}-vlckit-

      - name: Build VLCKit
        env:
          # Turn off "warning as error" and deprecation warnings for safer compilation
          CFLAGS: "-Wno-error -Wno-deprecated-declarations"
          CXXFLAGS: "-Wno-error -Wno-deprecated-declarations"
        run: |
          # Enable verbose output and exit on first error
          set -e -x
          chmod +x build-vlckit-4chan.sh
          # Redirect output to a log file and also print to console
          ./build-vlckit-4chan.sh 2>&1 | tee build.log

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
